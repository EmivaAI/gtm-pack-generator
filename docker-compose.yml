version: '3.8'

services:
  db:
    image: postgres:15
    container_name: emiva-db
    restart: always
    environment:
      - POSTGRES_USER=emiva-user
      - POSTGRES_PASSWORD=emiva-password
      - POSTGRES_DB=emiva-db
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U emiva-user -d emiva-db"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  emiva-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: emiva-api
    command: uv run --package emiva_api uvicorn emiva_api.main:app --host 0.0.0.0 --port 8001
    ports:
      - "8001:8001"
    environment:
      - POSTGRES_USER=emiva-user
      - POSTGRES_PASSWORD=emiva-password
      - POSTGRES_DB=emiva-db
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - DEBUG=True
    depends_on:
      db:
        condition: service_healthy

  gtm-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gtm-service
    command: uv run --package gtm_pack_generator uvicorn gtm_pack_generator.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - POSTGRES_USER=emiva-user
      - POSTGRES_PASSWORD=emiva-password
      - POSTGRES_DB=emiva-db
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - DEBUG=True
    depends_on:
      db:
        condition: service_healthy
      emiva-api:
        condition: service_started

volumes:
  postgres_data:
