- request:
    body: '{"messages":[{"role":"system","content":"You are an expert Go-To-Market
      (GTM) strategist and copywriter.\nYour goal is to generate high-quality GTM
      assets based on the strict context constraints provided.\nYou must adhere completely
      to the Brand Profile tone rules, and NEVER use disallowed claims.\n"},{"role":"user","content":"Please
      generate a comprehensive Internal Launch Brief for cross-functional teams (Sales,
      Marketing, Support, Leadership).\nUse the following context:\n=== PRODUCT CHANGE
      EVENT ===\nTitle: Smart Alerts: AI-powered anomaly detection\nDescription: Automatically
      surfaces statistically significant metric drops and spikes to analysts, cutting
      manual investigation time by ~60%.\n\nLaunch Tier: TIER_1\nLaunch Decision Reasons:
      [\"High customer impact \\u2014 affects all dashboard users\", \"Addresses #1
      support ticket theme: missed anomalies\"]\n\n=== BRAND PROFILE ===\nProduct
      Summary: Acme Analytics is a B2B SaaS platform helping data teams monitor business
      KPIs in real time.\nTone Rules: {\"voice\": \"confident but approachable\",
      \"avoid\": [\"hype\", \"jargon\"]}\nAllowed Claims: [\"60% reduction in investigation
      time\", \"SOC 2 Type II certified\"]\nDISALLOWED Claims (NEVER USE): [\"best
      in class\", \"industry leading\", \"guaranteed ROI\"]\n\n=== TARGET AUDIENCES
      ===\nPersona: Data Analyst\n  - Pain Points: [\"Too many false-positive alerts\",
      \"Alert fatigue from manual monitoring\"]\n  - Desired Outcomes: [\"Catch real
      anomalies faster\", \"Less time on dashboards\"]\n  - Typical Objections: [\"Will
      it trigger too often?\"]\n\nPersona: Engineering Manager\n  - Pain Points: [\"Team
      spends hours on manual metric review\"]\n  - Desired Outcomes: [\"Reduce on-call
      burden\", \"Confidence in data quality\"]\n  - Typical Objections: [\"Integration
      complexity\", \"Cost overhead\"]\n\n\nFormat the brief with clear sections:
      Summary, Value Prop, Key Audiences, and FAQs.\nReturn the result directly as
      plain text/markdown.\n"}],"model":"llama-3.3-70b-versatile","n":1,"reasoning_effort":null,"reasoning_format":null,"service_tier":"on_demand","stop":null,"stream":false,"temperature":0.7}'
